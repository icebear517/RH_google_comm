<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google 評論查詢系統 - 卡里善之樹</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <style>
        :root {
            /* 淡粉系主題色 (馬卡龍色調，確保白色背景上清晰) */
            --pastel-red: #E57373;
            --pastel-orange: #FFB74D;
            --pastel-yellow: #FBC02D; /* 微調偏深一點的黃，避免太亮看不見 */
            --pastel-green: #81C784;
            --pastel-blue: #64B5F6;
            --pastel-purple: #BA68C8;
            
            --bg-color: #F9FAFB;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --star-color: #FBC02D;
            --star-empty: #e2e8f0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 25px; }
        h1 { color: #2d3748; margin-bottom: 5px; letter-spacing: 1px; }
        header p { color: var(--text-muted); margin-top: 0; }

        /* 頁籤導覽列 (純色切換) */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .tab-btn:hover { background: #edf2f7; }
        
        /* 頁籤的專屬粉系強調色 */
        .tab-btn[data-target="tab-reviews"].active { background: var(--pastel-red); color: white; }
        .tab-btn[data-target="tab-dashboard"].active { background: var(--pastel-blue); color: white; }
        .tab-btn[data-target="tab-wordcloud"].active { background: var(--pastel-purple); color: white; }

        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 搜尋與篩選區塊 */
        .controls-wrapper { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 25px; }
        .search-box { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
        input, select { padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; flex: 1; min-width: 180px; outline: none; transition: border-color 0.2s; color: var(--text-main); }
        
        /* 輸入框的粉系 Focus 狀態 */
        input:focus { border-color: var(--pastel-red); }
        select#ratingFilter:focus { border-color: var(--pastel-orange); }
        select#timeRangeFilter:focus { border-color: var(--pastel-yellow); }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--text-muted); border-top: 1px solid #edf2f7; padding-top: 15px; }

        /* 評論卡片 (移除漸層，改用純色飾條) */
        .review-card { background: var(--card-bg); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 20px; border-top: 5px solid #ccc; }
        .card-header { display: flex; align-items: center; margin-bottom: 16px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: bold; margin-right: 16px; flex-shrink: 0; }
        .header-info { flex: 1; }
        .author-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; color: var(--text-main); }
        .meta-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .stars { color: var(--star-color); font-size: 16px; letter-spacing: 1px; }
        .stars-empty { color: var(--star-empty); }
        .date { color: var(--text-muted); }
        .content { font-size: 16px; line-height: 1.7; color: var(--text-main); white-space: pre-line; }

        /* 分頁 */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 30px; margin-bottom: 50px; flex-wrap: wrap; }
        .page-btn { padding: 8px 16px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; border-radius: 8px; font-weight: 500; color: var(--text-muted); transition: all 0.2s;}
        .page-btn.active { background: var(--pastel-green); color: white; border-color: var(--pastel-green); }
        .page-btn:disabled { background: #f7fafc; color: #cbd5e0; cursor: not-allowed; }

        /* 智能摘要區塊 (淡紅背景) */
        .ai-summary-card { background-color: #fffafb; border-left: 5px solid var(--pastel-red); padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .ai-title { font-size: 18px; font-weight: bold; color: var(--pastel-red); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .ai-content { font-size: 16px; line-height: 1.8; color: #4a5568; white-space: pre-line; }

        /* 數據看板 Dashboard */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .dash-card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); text-align: center; border-top: 4px solid #ccc; }
        
        .dash-card.total-card { border-top-color: var(--pastel-orange); }
        .dash-card.total-card .dash-value { color: var(--pastel-orange); }
        
        .dash-card.avg-card { border-top-color: var(--pastel-yellow); }
        .dash-card.avg-card .dash-value { color: var(--pastel-yellow); }

        .dash-title { font-size: 16px; color: var(--text-muted); margin-bottom: 10px; font-weight: bold;}
        .dash-value { font-size: 42px; font-weight: bold; }
        .dash-stars { color: var(--star-color); font-size: 24px; margin-top: 5px; }
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 15px; }

        /* 文字雲 */
        .wordcloud-wrapper { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); display: flex; justify-content: center; align-items: center; background-color: #fafafa; border-top: 5px solid var(--pastel-purple);}
        #wordCloudCanvas { max-width: 100%; border-radius: 8px; }
        #loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Google 評論數據庫</h1>
        <p>卡里善之樹 ｜ 顧客回饋與數據分析</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-target="tab-reviews" onclick="switchTab('tab-reviews', this)">📝 評論列表</button>
        <button class="tab-btn" data-target="tab-dashboard" onclick="switchTab('tab-dashboard', this)">📊 數據看板與摘要</button>
        <button class="tab-btn" data-target="tab-wordcloud" onclick="switchTab('tab-wordcloud', this)">☁️ 文字雲</button>
    </div>

    <div class="controls-wrapper" id="filter-wrapper">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜尋關鍵字...">
            <select id="ratingFilter">
                <option value="all">所有星級</option>
                <option value="5">⭐⭐⭐⭐⭐ 5 星</option>
                <option value="4">⭐⭐⭐⭐ 4 星</option>
                <option value="3">⭐⭐⭐ 3 星以下</option>
            </select>
            <select id="timeRangeFilter">
                <option value="all">全部時間</option>
                <option value="1">近 1 年</option>
                <option value="2">近 2 年</option>
                <option value="3">近 3 年</option>
            </select>
        </div>
        <div class="controls-row">
            <div id="stats">準備載入資料...</div>
            <div id="pagination-controls">
                每頁顯示：
                <select id="pageSize" style="padding: 6px 10px; min-width: 80px; margin-left: 8px;">
                    <option value="10">10 筆</option>
                    <option value="20">20 筆</option>
                    <option value="50">50 筆</option>
                </select>
            </div>
        </div>
    </div>

    <div id="loading">正在從資料庫同步最新評論，請稍候...</div>

    <div id="tab-reviews" class="tab-content active">
        <div id="results"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <div id="tab-dashboard" class="tab-content">
        <div class="ai-summary-card">
            <div class="ai-title">✨ 區間智能洞察報告</div>
            <div class="ai-content" id="ai-summary-content">正在分析數據中...</div>
        </div>

        <div class="dashboard-grid">
            <div class="dash-card total-card">
                <div class="dash-title">期間總評論數</div>
                <div class="dash-value" id="dash-total">0</div>
                <div class="dash-title" style="margin-top:5px; font-weight:normal;">則</div>
            </div>
            <div class="dash-card avg-card">
                <div class="dash-title">期間平均星級</div>
                <div class="dash-value" id="dash-avg">0.0</div>
                <div class="dash-stars" id="dash-avg-stars"></div>
            </div>
        </div>
        <div class="dashboard-grid">
            <div class="dash-card" style="border-top-color: var(--pastel-green);">
                <div class="dash-title">星級分佈圖</div>
                <div class="chart-container"><canvas id="barChart"></canvas></div>
            </div>
            <div class="dash-card" style="border-top-color: var(--pastel-purple);">
                <div class="dash-title">新增評論趨勢</div>
                <div class="chart-container"><canvas id="lineChart"></canvas></div>
            </div>
        </div>
    </div>

    <div id="tab-wordcloud" class="tab-content">
        <div class="wordcloud-wrapper" id="wordcloud-container">
            <canvas id="wordCloudCanvas" width="800" height="500"></canvas>
        </div>
    </div>

</div>

<script>
    const rawUrl = 'https://docs.google.com/spreadsheets/d/1e6x389r3Auq3yGQNSj0LTSKcRhPC3CuV1wtfFdl75TI/edit?usp=sharing';
    let chartInstanceBar = null;
    let chartInstanceLine = null;

    // 定義六種淡粉系主題色
    const pastelColors = ['#E57373', '#FFB74D', '#FBC02D', '#81C784', '#64B5F6', '#BA68C8']; 

    function getCsvUrl(url) {
        const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        if (match && match[1]) return `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=csv`;
        return url;
    }

    window.switchTab = function(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        document.getElementById('pagination-controls').style.display = (tabId === 'tab-reviews') ? 'block' : 'none';

        if (tabId === 'tab-wordcloud') setTimeout(renderWordCloud, 100);
    };

    function getAvatarColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return pastelColors[Math.abs(hash) % pastelColors.length];
    }

    function cleanReviewContent(text) {
        if (!text) return '';
        let cleaned = text.replace(/^"|"$/g, '').replace(/""/g, '"').trim();
        cleaned = cleaned.replace(/^{"en":\s*"/i, '').replace(/"}$/, '').replace(/\\n/g, '\n');
        if (cleaned === '{}' || cleaned === '{ }' || cleaned.trim() === '') return '';
        return cleaned;
    }

    function formatDate(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (!isNaN(d.getTime())) {
            return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
        }
        return dateStr.split(' ')[0].replace(/-/g, '/');
    }

    let allReviews = [];
    let filteredReviews = [];
    let currentPage = 1;
    let itemsPerPage = 10;

    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        const result = [];
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i];
            if (!line.trim()) continue;
            const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (row.length >= 6) {
                const cleanedContent = cleanReviewContent(row[4]);
                if (!cleanedContent) continue;
                result.push({
                    author: (row[2] || '').replace(/^"|"$/g, '').trim(),
                    rating: parseInt(row[3]) || 0,
                    content: cleanedContent,
                    date: formatDate((row[5] || '').replace(/^"|"$/g, '').trim()) 
                });
            }
        }
        return result.filter(r => r.author && r.rating);
    }

    function renderAll() {
        renderList();
        renderDashboard();
        generateSmartSummary(); 
        if (document.getElementById('tab-wordcloud').classList.contains('active')) renderWordCloud();
        document.getElementById('stats').innerText = `目前篩選出 ${filteredReviews.length} 則評論`;
    }

    function renderList() {
        const resultsDiv = document.getElementById('results');
        const paginationDiv = document.getElementById('pagination');
        if (filteredReviews.length === 0) {
            resultsDiv.innerHTML = '<div class="review-card" style="text-align:center; padding: 40px; border-top-color:#ccc;">找不到符合條件的評論。</div>';
            paginationDiv.innerHTML = '';
            return;
        }
        const totalPages = Math.ceil(filteredReviews.length / itemsPerPage);
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        const currentData = filteredReviews.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);
        
        resultsDiv.innerHTML = currentData.map((r, index) => {
            const initial = r.author.charAt(0).toUpperCase();
            // 循環分配六種顏色做為卡片頂部邊框
            const borderColor = pastelColors[index % pastelColors.length];
            return `
            <div class="review-card" style="border-top-color: ${borderColor};">
                <div class="card-header">
                    <div class="avatar" style="background-color: ${getAvatarColor(r.author)}">${initial}</div>
                    <div class="header-info">
                        <div class="author-name">${r.author}</div>
                        <div class="meta-row">
                            <span class="stars">${'★'.repeat(r.rating)}<span class="stars-empty">${'★'.repeat(5 - r.rating)}</span></span>
                            <span class="date">${r.date}</span>
                        </div>
                    </div>
                </div>
                <div class="content">${r.content}</div>
            </div>`;
        }).join('');
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const paginationDiv = document.getElementById('pagination');
        let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一頁</button>`;
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);
        for (let i = startPage; i <= endPage; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一頁</button>`;
        paginationDiv.innerHTML = html;
    }

    window.changePage = function(page) { currentPage = page; renderList(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

    function renderDashboard() {
        const total = filteredReviews.length;
        document.getElementById('dash-total').innerText = total;
        if (total === 0) return;
        const avg = (filteredReviews.reduce((sum, r) => sum + r.rating, 0) / total).toFixed(1);
        document.getElementById('dash-avg').innerText = avg;
        document.getElementById('dash-avg-stars').innerText = '★'.repeat(Math.round(avg));

        const ratingsCount = [0, 0, 0, 0, 0];
        filteredReviews.forEach(r => { if(r.rating >= 1 && r.rating <= 5) ratingsCount[r.rating - 1]++; });

        if(chartInstanceBar) chartInstanceBar.destroy();
        chartInstanceBar = new Chart(document.getElementById('barChart').getContext('2d'), {
            type: 'bar',
            data: { 
                labels: ['1星', '2星', '3星', '4星', '5星'], 
                datasets: [{ 
                    label: '評論數', 
                    data: ratingsCount, 
                    // 長條圖依序套用 紅、橙、黃、綠、藍
                    backgroundColor: [pastelColors[0], pastelColors[1], pastelColors[2], pastelColors[3], pastelColors[4]], 
                    borderRadius: 6 
                }] 
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        const trendMap = {};
        filteredReviews.forEach(r => {
            if(r.date.length >= 7) {
                const ym = r.date.substring(0, 7);
                trendMap[ym] = (trendMap[ym] || 0) + 1;
            }
        });
        const sortedMonths = Object.keys(trendMap).sort();
        if(chartInstanceLine) chartInstanceLine.destroy();
        chartInstanceLine = new Chart(document.getElementById('lineChart').getContext('2d'), {
            type: 'line',
            data: { 
                labels: sortedMonths, 
                datasets: [{ 
                    label: '新增評論數', 
                    data: sortedMonths.map(m => trendMap[m]), 
                    borderColor: pastelColors[5], // 折線圖使用淡紫色
                    backgroundColor: 'rgba(186, 104, 200, 0.15)', // 紫色帶透明度
                    borderWidth: 3,
                    tension: 0.3, 
                    fill: true 
                }] 
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function generateSmartSummary() {
        const container = document.getElementById('ai-summary-content');
        if (filteredReviews.length === 0) {
            container.innerHTML = "目前沒有足夠的數據可供分析。請嘗試放寬篩選條件。";
            return;
        }

        const total = filteredReviews.length;
        const avg = (filteredReviews.reduce((sum, r) => sum + r.rating, 0) / total).toFixed(1);
        const highRatings = filteredReviews.filter(r => r.rating >= 4).length;
        const satisfactionRate = Math.round((highRatings / total) * 100);

        let timeText = "在所有紀錄中";
        const timeVal = document.getElementById('timeRangeFilter').value;
        if (timeVal === '1') timeText = "在近 1 年內";
        if (timeVal === '2') timeText = "在近 2 年內";
        if (timeVal === '3') timeText = "在近 3 年內";

        const stopWords = new Set(['的','了','是','在','我','有','和','就','不','人','都','一個','我們','可以','這裡','覺得','非常','真的','很多','因為','不過','雖然','但是','其實','看到','這樣','比較','而且','還有','這個','然後','太','也','很','這','去','會','說','想','到','用','再','能','把','被','給','來','做','看','好','與','為','讓','從','什麼','地方','不錯']);
        const customDict = ['卡里善之樹', '為愛撐傘', '概念館', '彩繪牆', '裝置藝術', '停車場', '北極宮'];
        let wordCounts = {};
        
        filteredReviews.forEach(r => {
            let text = r.content.replace(/[^\u4e00-\u9fa5]/g, ' ');
            customDict.forEach(dictWord => { if(text.includes(dictWord)) wordCounts[dictWord] = (wordCounts[dictWord] || 0) + 1; });
            for(let i=0; i < text.length - 1; i++) {
                let biGram = text.substring(i, i+2);
                if(!stopWords.has(biGram) && biGram.trim().length === 2) wordCounts[biGram] = (wordCounts[biGram] || 0) + 1;
            }
        });
        
        let topWords = Object.entries(wordCounts).sort((a,b) => b[1] - a[1]).slice(0, 3).map(w => w[0]);

        let report = `根據數據顯示，${timeText}，卡里善之樹共累積了 **${total} 則評論**，顧客的整體滿意度達到 **${satisfactionRate}%**（平均星數 ${avg} 星）。\n\n`;
        if (topWords.length > 0) report += `在評論內容中，顧客最常給予正面回饋或提及的亮點包含：「**${topWords.join('」、「')}**」。\n\n`;

        if (avg >= 4.5) report += `總結來說，品牌在結合在地產業與社區藝術的發展上，獲得了極高的肯定。建議可延續目前的服務品質，並持續運用社群宣傳特色體驗活動。`;
        else if (avg >= 4.0) report += `總體表現相當優良，多數訪客均留下良好印象。若能從 3 星以下的評論中萃取建議並進行微調，將能帶來更完美的參訪體驗。`;
        else report += `在星級表現上仍有成長空間。建議小編與團隊可以針對評論中提到的特定問題（例如動線或設施）進行內部討論與優化。`;

        container.innerHTML = report.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--pastel-red); font-size:1.1em;">$1</strong>');
    }

    function getWordCloudData() {
        const stopWords = new Set(['的','了','是','在','我','有','和','就','不','人','都','一個','我們','可以','這裡','覺得','非常','真的','很多','還是','因為','不過','雖然','但是','其實','看到','這樣','那個','怎麼','比較','而且','還有','這個','然後','太','也','很','這','去','會','說','想','到','用','再','能','把','被','給','來','做','看','好','與','為','讓','從','啊','喔','呢','吧','嗎','就是','一下','一些','一點','所以','如果','他們','什麼','地方','不錯','一樣','應該','沒有','起來','發現']);
        const customDict = ['卡里善之樹', '為愛撐傘', '概念館', '彩繪牆', '裝置藝術', '停車場', '北極宮'];
        let counts = {};
        filteredReviews.forEach(r => {
            let text = r.content.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, ' '); 
            let segments = text.split(/\s+/);
            segments.forEach(seg => {
                customDict.forEach(dictWord => { if (seg.includes(dictWord)) counts[dictWord] = (counts[dictWord] || 0) + 2; });
                for (let len = 5; len >= 2; len--) {
                    for (let i = 0; i <= seg.length - len; i++) {
                        let word = seg.substring(i, i + len);
                        if (!stopWords.has(word)) counts[word] = (counts[word] || 0) + 1;
                    }
                }
            });
        });
        let words = Object.keys(counts).sort((a, b) => b.length - a.length);
        for (let i = 0; i < words.length; i++) {
            let longerWord = words[i];
            if (counts[longerWord] < 2) { delete counts[longerWord]; continue; }
            for (let j = i + 1; j < words.length; j++) {
                let shorterWord = words[j];
                if (counts[shorterWord] > 0 && longerWord.includes(shorterWord)) {
                    if (counts[longerWord] >= counts[shorterWord] * 0.4) counts[shorterWord] = 0;
                    else counts[shorterWord] -= counts[longerWord];
                }
            }
        }
        let finalWords = [];
        for (let word in counts) if (counts[word] >= 2 && !stopWords.has(word[0]) && !stopWords.has(word[word.length-1])) finalWords.push([word, counts[word]]);
        return finalWords.sort((a, b) => b[1] - a[1]).slice(0, 60);
    }

    function renderWordCloud() {
        let topWords = getWordCloudData();
        if (topWords.length === 0) return;
        const maxWeight = topWords[0][1];
        const minWeight = topWords[topWords.length - 1][1];
        let cloudList = topWords.map(item => [item[0], minWeight === maxWeight ? 40 : 15 + ((item[1] - minWeight) / (maxWeight - minWeight)) * 65]);

        WordCloud(document.getElementById('wordCloudCanvas'), {
            list: cloudList, 
            fontFamily: '"PingFang TC", "Microsoft JhengHei", sans-serif', 
            fontWeight: 'bold',
            // 從六種淡粉色系中隨機挑選顏色給文字
            color: () => pastelColors[Math.floor(Math.random() * pastelColors.length)],
            rotateRatio: 0.3, rotationSteps: 2, backgroundColor: 'transparent', shape: 'circle',
            gridSize: Math.round(12 * document.getElementById('wordcloud-container').offsetWidth / 800), drawOutOfBound: false, shrinkToFit: true
        });
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const ratingTerm = document.getElementById('ratingFilter').value;
        const timeTerm = document.getElementById('timeRangeFilter').value;
        
        const now = new Date();
        const cutoffDate = new Date();
        if (timeTerm !== 'all') cutoffDate.setFullYear(now.getFullYear() - parseInt(timeTerm));

        filteredReviews = allReviews.filter(r => {
            const matchesSearch = r.content.toLowerCase().includes(searchTerm) || r.author.toLowerCase().includes(searchTerm);
            const matchesRating = ratingTerm === 'all' || (ratingTerm === '3' ? r.rating <= 3 : r.rating == ratingTerm);
            let matchesTime = true;
            if (timeTerm !== 'all' && r.date) {
                const rDate = new Date(r.date);
                matchesTime = rDate >= cutoffDate;
            }
            return matchesSearch && matchesRating && matchesTime;
        });

        currentPage = 1;
        renderAll();
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('ratingFilter').addEventListener('change', applyFilters);
    document.getElementById('timeRangeFilter').addEventListener('change', applyFilters);
    document.getElementById('pageSize').addEventListener('change', (e) => { itemsPerPage = parseInt(e.target.value); currentPage = 1; renderList(); });

    const fetchUrl = getCsvUrl(rawUrl);
    fetch(fetchUrl).then(res => res.text()).then(text => {
        document.getElementById('loading').style.display = 'none';
        allReviews = parseCSV(text);
        filteredReviews = [...allReviews];
        renderAll();
    });
</script>
